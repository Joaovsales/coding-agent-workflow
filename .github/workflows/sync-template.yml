name: Sync coding-agent-workflow (reusable)

# Reusable workflow: called by downstream project repos to vendor the
# template-managed workflow files (skills, agents, hooks, CLAUDE.md) from the
# public coding-agent-workflow repo, opening a PR with any changes.
#
# Managed (overwritten/added, never deleted): CLAUDE.md, .agents/skills/,
#   .claude/skills/, .claude/agents/, .claude/hooks/, .claude/settings.json
# Preserved (never touched): .claude/project.md, AGENTS.md, CLAUDE.local.md

on:
  workflow_call:
    inputs:
      template_ref:
        description: "Ref of coding-agent-workflow to sync from"
        type: string
        default: "master"
      auto_merge:
        description: "Auto-merge the sync PR once required checks pass"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo (default branch)
        uses: actions/checkout@v4

      - name: Fetch template (public, no auth)
        id: fetch
        run: |
          set -euo pipefail
          rm -rf .tpl-sync
          git clone --depth 1 --branch "${{ inputs.template_ref }}" \
            https://github.com/Joaovsales/coding-agent-workflow .tpl-sync
          echo "sha=$(git -C .tpl-sync rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Apply managed paths (non-destructive; preserve project files)
        run: |
          set -euo pipefail
          T=.tpl-sync
          # Overwrite + add from template. No --delete: an auto-merged PR must
          # never silently remove a repo-local file.
          mirror() {
            if [ -d "$T/$1" ]; then
              mkdir -p "$1"
              rsync -a "$T/$1/" "$1/"
            fi
          }
          mirror ".agents/skills"
          mirror ".claude/skills"
          mirror ".claude/agents"
          mirror ".claude/hooks"
          if [ -f "$T/.claude/settings.json" ]; then
            mkdir -p .claude
            cp "$T/.claude/settings.json" ".claude/settings.json"
          fi
          [ -f "$T/CLAUDE.md" ] && cp "$T/CLAUDE.md" "CLAUDE.md"
          # Preserved, never touched: .claude/project.md, AGENTS.md, CLAUDE.local.md
          rm -rf "$T"

      - name: Create or update sync PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/sync-coding-agent-workflow
          base: ${{ github.event.repository.default_branch }}
          delete-branch: true
          commit-message: "chore(workflow): sync coding-agent-workflow@${{ steps.fetch.outputs.sha }}"
          title: "chore: sync coding-agent-workflow template"
          body: |
            Automated sync of the template-managed workflow files from
            [coding-agent-workflow@${{ inputs.template_ref }}](https://github.com/Joaovsales/coding-agent-workflow/tree/${{ inputs.template_ref }})
            (`${{ steps.fetch.outputs.sha }}`).

            **Managed (overwritten/added):** `CLAUDE.md`, `.agents/skills/`, `.claude/skills/`, `.claude/agents/`, `.claude/hooks/`, `.claude/settings.json`
            **Preserved (untouched):** `.claude/project.md`, `AGENTS.md`, `CLAUDE.local.md`

            Files are added/overwritten but never deleted. Generated by the reusable sync workflow.

      - name: Enable auto-merge when green
        if: ${{ inputs.auto_merge && steps.cpr.outputs.pull-request-number }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}"
